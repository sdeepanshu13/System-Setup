name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package release zip
        shell: pwsh
        run: |
          $distDir = 'dist'
          $zipDir  = "$distDir\staging"
          $hiddenDir = "$zipDir\.setup"
          if (Test-Path $distDir) { Remove-Item $distDir -Recurse -Force }
          New-Item -ItemType Directory -Path $hiddenDir -Force | Out-Null

          # Setup.cmd goes at the root (visible to user)
          Copy-Item 'Windows\Setup.cmd' $zipDir

          # Everything else goes in .setup
          $files = @(
            'Windows\Setup.ps1',
            'Windows\Setup-UI.ps1',
            'Windows\restore.ps1',
            'Windows\Enable-WindowsFeatures.ps1',
            'Windows\bootstrap-dev.sh',
            'Windows\winget-packages.json',
            'Windows\vscode-extensions.txt',
            'Windows\zshrc-template',
            'Windows\p10k-template',
            'Windows\zsh-gitbash.tar.gz'
          )
          foreach ($f in $files) {
            Copy-Item $f $hiddenDir
          }

          # Zip the CONTENTS (not the folder) so extraction gives flat files
          Compress-Archive -Path "$zipDir\*" -DestinationPath "$distDir\System-Setup.zip" -Force

          $hash = (Get-FileHash "$distDir\System-Setup.zip" -Algorithm SHA256).Hash
          $size = '{0:N1} MB' -f ((Get-Item "$distDir\System-Setup.zip").Length / 1MB)
          "zip_hash=$hash" >> $env:GITHUB_OUTPUT
          "zip_size=$size" >> $env:GITHUB_OUTPUT
        id: package

      - name: Get version tag
        id: version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHORT=$(git rev-parse --short HEAD)
          TAG="v1.0.${COUNT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=v1.0.${COUNT} (${SHORT})" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## Download

            **Download `System-Setup.zip`**, extract it, and **double-click `Setup.cmd`** inside.

            No exe, no SmartScreen warnings, no Defender blocks.

            | File | Size | SHA-256 |
            |------|------|---------|
            | `System-Setup.zip` | ${{ steps.package.outputs.zip_size }} | `${{ steps.package.outputs.zip_hash }}` |

            Built from [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: dist/System-Setup.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
